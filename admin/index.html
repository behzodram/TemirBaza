<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Управление Металлоломом</title>
    <style>@import url('style.css');</style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>🔐 Admin Panel</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" required placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="login-btn">Войти</button>
                <div class="error-message" id="errorMessage">Неверный логин или пароль</div>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-container">
        <div class="admin-header">
            <h1>📊 Панель Управления</h1>
            <button class="logout-btn" onclick="logout()">Выход</button>
        </div>

        <div class="admin-content">
            <div class="tabs">
                <button class="tab active" onclick="showTab('orders')">📋 Заявки</button>
                <button class="tab" onclick="showTab('prices')">💰 Цены</button>
            </div>

            <!-- Orders Tab -->
            <div id="ordersTab" class="tab-content active">
                <div id="ordersGrid" class="orders-grid">
                    <!-- Orders will be loaded here -->
                </div>
            </div>

            <!-- Prices Tab -->
            <div id="pricesTab" class="tab-content">
                <div id="pricesGrid" class="prices-grid">
                    <!-- Prices will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Детали Заявки</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Order details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="successToast" class="success-toast">
        ✅ Цена успешно обновлена!
    </div>

    <script type="module">import "./script.js?v=3";</script>
</body>
</html>
